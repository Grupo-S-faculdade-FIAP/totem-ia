[pytest]
# Configuração padrão para pytest
minversion = 7.0
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = 
    -v
    --strict-markers
    --tb=short
markers =
    unit: Testes unitários (classificador, DB)
    integration: Testes de integração (rotas Flask, ESP32)
    slow: Testes lentos (requerem hardware)
