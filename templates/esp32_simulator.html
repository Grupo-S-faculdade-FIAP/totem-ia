<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🤖 Simulador ESP32 - TOTEM IA</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 600px;
            width: 100%;
            padding: 40px;
        }
        
        .header {
            text-align: center;
            margin-bottom: 40px;
        }
        
        .header h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 28px;
        }
        
        .header p {
            color: #666;
            font-size: 14px;
        }
        
        .sensors-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .sensor-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 15px;
            padding: 25px;
            color: white;
            text-align: center;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        
        .sensor-card.presence {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
        }
        
        .sensor-card.weight {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
        }
        
        .sensor-icon {
            font-size: 40px;
            margin-bottom: 10px;
        }
        
        .sensor-label {
            font-size: 14px;
            opacity: 0.9;
            margin-bottom: 15px;
        }
        
        .sensor-value {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 15px;
        }
        
        .toggle-btn {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            background: rgba(255,255,255,0.3);
            color: white;
            transition: all 0.3s ease;
        }
        
        .toggle-btn:hover {
            background: rgba(255,255,255,0.5);
            transform: scale(1.05);
        }
        
        .toggle-btn.active {
            background: rgba(0,255,0,0.3);
            border: 2px solid white;
        }
        
        .weight-control {
            width: 100%;
        }
        
        .slider {
            width: 100%;
            height: 6px;
            border-radius: 3px;
            background: rgba(255,255,255,0.3);
            outline: none;
            -webkit-appearance: none;
            cursor: pointer;
        }
        
        .slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: white;
            cursor: pointer;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }
        
        .slider::-moz-range-thumb {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: white;
            cursor: pointer;
            border: none;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }
        
        .test-section {
            background: #f8f9fa;
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 25px;
        }
        
        .test-title {
            color: #333;
            margin-bottom: 15px;
            font-size: 16px;
            font-weight: bold;
        }
        
        .btn-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }
        
        .btn {
            padding: 12px 20px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            grid-column: 1 / -1;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }
        
        .btn-secondary {
            background: #e9ecef;
            color: #333;
        }
        
        .btn-secondary:hover {
            background: #dee2e6;
        }
        
        .response-section {
            background: #f8f9fa;
            border-radius: 15px;
            padding: 20px;
            margin-top: 20px;
        }
        
        .response-title {
            color: #333;
            margin-bottom: 12px;
            font-size: 14px;
            font-weight: bold;
        }
        
        .response-box {
            background: white;
            border: 2px solid #dee2e6;
            border-radius: 8px;
            padding: 15px;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            color: #333;
            max-height: 200px;
            overflow-y: auto;
            line-height: 1.5;
        }
        
        .status-indicator {
            display: inline-block;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            margin-right: 8px;
            animation: pulse 2s infinite;
        }
        
        .status-indicator.online {
            background: #51cf66;
        }
        
        .status-indicator.offline {
            background: #ff6b6b;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        .status-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
        }
        
        .status-left {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .status-right {
            color: #666;
        }
        
        .success {
            color: #51cf66;
            font-weight: bold;
        }
        
        .error {
            color: #ff6b6b;
            font-weight: bold;
        }
        
        .warning {
            color: #ffd43b;
            font-weight: bold;
        }
        
        @media (max-width: 600px) {
            .container {
                padding: 20px;
            }
            
            .sensors-grid {
                grid-template-columns: 1fr;
            }
            
            .header h1 {
                font-size: 22px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🤖 Simulador ESP32</h1>
            <p>TOTEM IA - Fase 2: Validação Mecânica</p>
        </div>
        
        <div class="status-bar">
            <div class="status-left">
                <span class="status-indicator online"></span>
                <span>Sistema Pronto</span>
            </div>
            <div class="status-right" id="statusTime">20:00</div>
        </div>
        
        <div class="sensors-grid">
            <!-- Sensor de Presença -->
            <div class="sensor-card presence">
                <div class="sensor-icon">📍</div>
                <div class="sensor-label">Sensor de Presença</div>
                <div class="sensor-value" id="presenceValue">❌ OFF</div>
                <button class="toggle-btn" id="presenceBtn" onclick="togglePresence()">
                    Ativar Presença
                </button>
            </div>
            
            <!-- Sensor de Peso -->
            <div class="sensor-card weight">
                <div class="sensor-icon">⚖️</div>
                <div class="sensor-label">Sensor de Peso</div>
                <div class="sensor-value" id="weightValue">2000g</div>
                <div class="weight-control">
                    <input type="range" class="slider" id="weightSlider" 
                           min="0" max="4095" value="2000" 
                           oninput="updateWeight()">
                </div>
            </div>
        </div>
        
        <div class="test-section">
            <div class="test-title">🧪 Testar Validação Completa</div>
            <div class="btn-group">
                <button class="btn btn-secondary" onclick="resetSensors()">Reset</button>
                <button class="btn btn-secondary" onclick="simulateSuccess()">Sucesso</button>
            </div>
            <button class="btn btn-primary" onclick="testValidation()">
                ▶️ Enviar para Validação
            </button>
        </div>
        
        <div class="response-section">
            <div class="response-title">📡 Resposta do Servidor</div>
            <div class="response-box" id="responseBox">
                Aguardando ação...
            </div>
        </div>
    </div>

    <script>
        let presence = false;
        let weight = 2000;
        
        function updateTime() {
            const now = new Date();
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            document.getElementById('statusTime').textContent = `${hours}:${minutes}`;
        }
        
        function togglePresence() {
            presence = !presence;
            updatePresenceDisplay();
            logResponse(`Presença: ${presence ? '✅ Ligada' : '❌ Desligada'}`);
        }
        
        function updatePresenceDisplay() {
            const btn = document.getElementById('presenceBtn');
            const value = document.getElementById('presenceValue');
            
            if (presence) {
                btn.classList.add('active');
                btn.textContent = 'Desativar Presença';
                value.textContent = '✅ ON';
            } else {
                btn.classList.remove('active');
                btn.textContent = 'Ativar Presença';
                value.textContent = '❌ OFF';
            }
        }
        
        function updateWeight() {
            weight = parseInt(document.getElementById('weightSlider').value);
            const weightOk = weight > 1500;
            const status = weightOk ? '✅ OK' : '⚠️ Baixo';
            document.getElementById('weightValue').textContent = `${weight}g ${status}`;
            logResponse(`Peso atualizado: ${weight}g ${status}`);
        }
        
        function resetSensors() {
            presence = false;
            weight = 2000;
            document.getElementById('weightSlider').value = 2000;
            updatePresenceDisplay();
            updateWeight();
            logResponse('Sensores resetados');
        }
        
        function simulateSuccess() {
            presence = true;
            weight = 2500;
            document.getElementById('weightSlider').value = 2500;
            updatePresenceDisplay();
            updateWeight();
            logResponse('Simulando caso de sucesso: presença ON, peso OK');
        }
        
        async function testValidation() {
            logResponse('⏳ Enviando validação...');
            
            const weightOk = weight > 1500;
            
            // Simular resposta do ESP32
            const esp32Response = {
                presence_detected: presence,
                weight_ok: weightOk,
                weight_value: weight,
                timestamp: Math.floor(Date.now() / 1000)
            };
            
            logResponse(`📡 Simulando ESP32:\n${JSON.stringify(esp32Response, null, 2)}\n\n⏳ Enviando para Flask...`);
            
            try {
                // Fetch da imagem de teste real
                const imageResponse = await fetch('/test_tampinha.jpg');
                
                if (!imageResponse.ok) {
                    logResponse(`❌ Erro: Imagem de teste não encontrada (404)\n\nCertifique-se que test_tampinha.jpg existe no diretório raiz`);
                    return;
                }
                
                const imageBlob = await imageResponse.blob();
                
                if (imageBlob.size === 0) {
                    logResponse(`❌ Erro: Imagem vazia\n\nA imagem de teste está vazia. Verifique o arquivo test_tampinha.jpg`);
                    return;
                }
                
                // Criar FormData com imagem real
                const formData = new FormData();
                formData.append('image', imageBlob, 'test_tampinha.jpg');
                
                logResponse(`📡 Simulando ESP32:\n${JSON.stringify(esp32Response, null, 2)}\n\n📸 Imagem: ${imageBlob.size} bytes\n\n⏳ Enviando para Flask...`);
                
                const flaskResponse = await fetch('/api/validate_mechanical', {
                    method: 'POST',
                    body: formData
                });
                
                const result = await flaskResponse.json();
                
                let resultText = `✅ ESP32 Response:\n${JSON.stringify(esp32Response, null, 2)}\n\n📊 Flask Response (${flaskResponse.status}):\n`;
                resultText += JSON.stringify(result, null, 2);
                
                if (flaskResponse.status === 200 && result.validation === 'OK') {
                    resultText += '\n\n🎉 SUCESSO! Depósito autorizado!';
                } else if (flaskResponse.status === 400 && result.status) {
                    resultText += '\n\n⚠️ Validação falhou - Verifique presença e peso';
                }
                
                logResponse(resultText);
                
            } catch (error) {
                logResponse(`❌ Erro: ${error.message}\n\nStack: ${error.stack}`);
            }
        }
        
        function logResponse(message) {
            const box = document.getElementById('responseBox');
            const timestamp = new Date().toLocaleTimeString('pt-BR');
            box.innerHTML = `[${timestamp}] ${message}`;
            box.scrollTop = box.scrollHeight;
        }
        
        // Inicializar
        updatePresenceDisplay();
        updateWeight();
        updateTime();
        setInterval(updateTime, 1000);
        
        logResponse('🎮 Sistema pronto. Configure os sensores e teste a validação.');
    </script>
</body>
</html>
