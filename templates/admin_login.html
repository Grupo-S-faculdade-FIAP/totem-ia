<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - TOTEM IA</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .login-container {
            width: 100%;
            max-width: 450px;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
            animation: slideIn 0.5s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* HEADER */
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 40px 20px;
            text-align: center;
        }

        .header h1 {
            font-size: 32px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            font-weight: 700;
        }

        .header .badge {
            background: rgba(255, 255, 255, 0.3);
            color: white;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .header p {
            font-size: 14px;
            opacity: 0.95;
            margin-top: 5px;
        }

        /* MAIN CONTENT */
        .content {
            padding: 40px;
        }

        /* FORM GROUP */
        .form-group {
            margin-bottom: 25px;
        }

        label {
            display: block;
            margin-bottom: 10px;
            font-weight: 600;
            color: #333;
            font-size: 15px;
        }

        label i {
            margin-right: 8px;
            color: #667eea;
        }

        input {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 15px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            transition: all 0.3s ease;
            background: #f9f9f9;
        }

        input:focus {
            outline: none;
            border-color: #667eea;
            background: white;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        input::placeholder {
            color: #999;
        }

        /* REMEMBER ME */
        .remember-forget {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            font-size: 14px;
        }

        .checkbox-wrapper {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        input[type="checkbox"] {
            width: 18px;
            height: 18px;
            padding: 0;
            cursor: pointer;
            accent-color: #667eea;
        }

        .checkbox-wrapper label {
            margin: 0;
            font-weight: 500;
            cursor: pointer;
            color: #666;
        }

        .forgot-password {
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
            transition: color 0.3s ease;
        }

        .forgot-password:hover {
            color: #764ba2;
        }

        /* BUTTON */
        .btn-login {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn-login:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.6);
        }

        .btn-login:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        /* ERROR ALERT */
        .alert {
            padding: 16px;
            border-radius: 10px;
            margin-bottom: 20px;
            display: none;
            animation: slideIn 0.3s ease-out;
            font-weight: 500;
        }

        .alert.error {
            background: linear-gradient(135deg, rgba(244, 67, 54, 0.1), rgba(244, 67, 54, 0.05));
            border: 2px solid #f44336;
            color: #c62828;
        }

        .alert.success {
            background: linear-gradient(135deg, rgba(76, 175, 80, 0.1), rgba(76, 175, 80, 0.05));
            border: 2px solid #4CAF50;
            color: #2e7d32;
        }

        .alert.show {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        /* LOADING SPINNER */
        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            width: 18px;
            height: 18px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        /* FOOTER */
        .footer {
            background: #f5f5f5;
            padding: 20px;
            text-align: center;
            font-size: 13px;
            color: #999;
            border-top: 1px solid #eee;
        }

        .footer i {
            margin-right: 6px;
            color: #667eea;
        }

        /* RESPONSIVE */
        @media (max-width: 480px) {
            .header h1 {
                font-size: 26px;
            }

            .content {
                padding: 30px;
            }

            .btn-login {
                padding: 14px;
                font-size: 15px;
            }

            label {
                font-size: 14px;
            }

            input {
                padding: 12px 14px;
                font-size: 14px;
            }
        }
    </style>
</head>

<body>
    <div class="login-container">
        <!-- HEADER -->
        <div class="header">
            <h1>
                <i class="fas fa-lock"></i>
                ADMIN
            </h1>
            <div class="badge">Painel de Controle</div>
            <p>Sistema de Administração - TOTEM IA</p>
        </div>

        <!-- MAIN CONTENT -->
        <div class="content">
            <!-- ERROR/SUCCESS ALERT -->
            <div class="alert error" id="alertMessage">
                <i class="fas fa-exclamation-circle"></i>
                <span id="alertText"></span>
            </div>

            <!-- LOGIN FORM -->
            <form id="loginForm" onsubmit="handleLogin(event)">
                <!-- USERNAME FIELD -->
                <div class="form-group">
                    <label for="username">
                        <i class="fas fa-user"></i>
                        Usuário
                    </label>
                    <input type="text" id="username" name="username" placeholder="Digite seu usuário" required
                        autocomplete="username">
                </div>

                <!-- PASSWORD FIELD -->
                <div class="form-group">
                    <label for="password">
                        <i class="fas fa-key"></i>
                        Senha
                    </label>
                    <input type="password" id="password" name="password" placeholder="Digite sua senha" required
                        autocomplete="current-password">
                </div>

                <!-- REMEMBER ME & FORGOT PASSWORD -->
                <div class="remember-forget">
                    <div class="checkbox-wrapper">
                        <input type="checkbox" id="remember" name="remember">
                        <label for="remember">Lembrar-me</label>
                    </div>
                    <a href="#" class="forgot-password">Esqueci a senha</a>
                </div>

                <!-- LOGIN BUTTON -->
                <button type="submit" class="btn-login" id="loginBtn">
                    <i class="fas fa-sign-in-alt"></i>
                    Entrar
                </button>
            </form>
        </div>

        <!-- FOOTER -->
        <div class="footer">
            <i class="fas fa-shield-alt"></i>
            Acesso restrito a administradores
        </div>
    </div>

    <script>
        // ========================================================================
        // CONFIGURAÇÃO
        // ========================================================================

        const loginForm = document.getElementById('loginForm');
        const loginBtn = document.getElementById('loginBtn');
        const usernameInput = document.getElementById('username');
        const passwordInput = document.getElementById('password');
        const rememberInput = document.getElementById('remember');
        const alertMessage = document.getElementById('alertMessage');
        const alertText = document.getElementById('alertText');

        // ========================================================================
        // RESTAURAR USUÁRIO SALVO
        // ========================================================================

        window.addEventListener('DOMContentLoaded', () => {
            const savedUsername = localStorage.getItem('admin_username');
            const savedRemember = localStorage.getItem('admin_remember');

            if (savedRemember === 'true' && savedUsername) {
                usernameInput.value = savedUsername;
                rememberInput.checked = true;
                passwordInput.focus();
            }
        });

        async function handleLogin(event) {
            event.preventDefault();

            const username = usernameInput.value.trim();
            const password = passwordInput.value;

            if (!username || !password) {
                showAlert('Por favor, preencha todos os campos', 'error');
                return;
            }

            loginBtn.disabled = true;
            loginBtn.innerHTML = '<div class="spinner"></div> Autenticando...';

            try {
                const response = await fetch('/api/admin/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        username: username,
                        password: password
                    })
                });

                const data = await response.json();

                if (response.ok && data.success) {
                    if (rememberInput.checked) {
                        localStorage.setItem('admin_username', username);
                        localStorage.setItem('admin_remember', 'true');
                    } else {
                        localStorage.removeItem('admin_username');
                        localStorage.removeItem('admin_remember');
                    }

                    showAlert('Login realizado com sucesso!', 'success');

                    setTimeout(() => {
                        window.location.href = '/admin/dashboard';
                    }, 1000);
                } else {
                    showAlert(data.message || 'Usuário ou senha inválidos', 'error');
                    passwordInput.value = '';
                }
            } catch (error) {
                console.error('Erro:', error);
                showAlert('Erro ao conectar com o servidor', 'error');
            } finally {
                loginBtn.disabled = false;
                loginBtn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Entrar';
            }
        }

        function showAlert(message, type) {
            alertText.textContent = message;
            alertMessage.classList.remove('error', 'success');
            alertMessage.classList.add(type, 'show');

            if (type === 'error') {
                setTimeout(() => {
                    alertMessage.classList.remove('show');
                }, 5000);
            }
        }

        passwordInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                handleLogin(e);
            }
        });
    </script>
</body>

</html>
